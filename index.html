<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladders | Socratic AI Tutor</title>
    <meta name="description" content="Ladders — A Socratic AI tutor that guides you to understanding through dialogue, not answers.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">

        <!-- ── Top Bar ── -->
        <header id="top-bar">
            <div class="logo-mark">
                <img src="/logo.png" alt="Ladders logo" class="logo-img">
                <span class="logo-text">Ladders</span>
            </div>
            <div class="mastery-pill">
                <span class="mastery-label">Mastery</span>
                <div class="progress-track">
                    <div id="progress-bar" class="progress-fill" style="width: 10%;"></div>
                </div>
            </div>
        </header>

        <!-- ── Main Content ── -->
        <main>

            <!-- Ghost Orb Section -->
            <section id="orb-section">
                <div class="orb-wrap">
                    <div id="ghost-orb" class="orb idle"></div>
                </div>
                <div id="status-text" class="status-text">I am listening...</div>
                <div id="hint-chip" class="hint-chip" aria-label="Current hint level"></div>
            </section>

            <!-- Interaction Zone -->
            <section id="interaction-zone">

                <!-- Upload State -->
                <div id="upload-container" class="active">
                    <p class="upload-prompt">Share what you're working on</p>
                    <div class="upload-options">
                        <label for="image-upload" class="upload-box" id="label-gallery">
                            <div class="upload-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                            </div>
                            <span class="upload-title">Gallery</span>
                            <span class="upload-sub">Upload notes or homework</span>
                            <input type="file" id="image-upload" accept="image/*" hidden>
                        </label>

                        <label for="camera-upload" class="upload-box" id="label-camera">
                            <div class="upload-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                            </div>
                            <span class="upload-title">Camera</span>
                            <span class="upload-sub">Snap a photo</span>
                            <input type="file" id="camera-upload" accept="image/*" capture="environment" hidden>
                        </label>
                    </div>
                </div>

                <!-- Chat State -->
                <div id="chat-container">
                    <div id="chat-messages" class="messages-area"></div>
                    <div class="input-row">
                        <input type="text" id="user-input" placeholder="Reply to the Ghost..." autocomplete="off">
                        <button id="send-btn" class="send-btn" aria-label="Send">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Quiz State -->
                <div id="quiz-container">
                    <div class="quiz-header">
                        <div class="quiz-title-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        </div>
                        <h2 class="quiz-title">Trial of Knowledge</h2>
                    </div>
                    <div id="quiz-loading" class="quiz-loading" style="display: none;">
                        <div class="quiz-spinner"></div>
                        <p>Preparing your trial...</p>
                    </div>
                    <div id="quiz-content"></div>
                </div>

            </section>
        </main>

        <!-- ── Bottom Actions ── -->
        <footer id="bottom-bar">
            <button id="hunch-btn" class="action-btn" aria-label="Get a hint">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                Hunch
            </button>
            <button id="quiz-btn" class="action-btn quiz-btn" aria-label="Take the quiz">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                Quiz
            </button>
        </footer>

    </div>
    <script src="src/js/main.js" type="module"></script>
</body>
</html>
