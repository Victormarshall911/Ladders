<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladders | Socratic AI Tutor</title>
    <meta name="description" content="Ladders — A Socratic AI tutor that guides you to understanding through dialogue, not answers.">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="dark-academic">
    <div id="app">
        <!-- Progress Bars -->
        <header>
            <div class="progress-container">
                <div class="progress-label">Mastery</div>
                <div class="progress-track">
                    <div id="progress-bar" class="progress-fill" style="width: 10%;"></div>
                </div>
            </div>
        </header>

        <main>
            <!-- Ghost Orb Sections -->
            <section id="orb-section">
                <div class="orb-container">
                    <div id="ghost-orb" class="orb idle"></div>
                </div>
                <div id="status-text" class="status-text">I am listening...</div>
                <div id="hint-chip" class="hint-chip" aria-label="Current hint level"></div>
            </section>

            <!-- Interaction Zone -->
            <section id="interaction-zone">
                <!-- Upload State -->
                <div id="upload-container" class="active">
                    <div class="upload-options">
                        <label for="image-upload" class="upload-box">
                            <div class="upload-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                            </div>
                            <p>Upload Gallery</p>
                            <span class="sub-text">Show me your notes</span>
                            <input type="file" id="image-upload" accept="image/*" hidden>
                        </label>

                        <label for="camera-upload" class="upload-box camera">
                            <div class="upload-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                            </div>
                            <p>Use Camera</p>
                            <span class="sub-text">Snap a photo</span>
                            <input type="file" id="camera-upload" accept="image/*" capture="environment" hidden>
                        </label>
                    </div>
                </div>

                <!-- Chat State -->
                <div id="chat-container">
                    <div id="chat-messages" class="messages-area"></div>
                    <div class="chat-input-wrapper">
                        <input type="text" id="user-input" placeholder="Type your thought..." autocomplete="off">
                        <button id="send-btn" class="icon-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Quiz State -->
                <div id="quiz-container">
                    <div class="quiz-header">
                        <div class="quiz-title-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        </div>
                        <h2 class="quiz-title">Trial of Knowledge</h2>
                    </div>
                    <div id="quiz-loading" class="quiz-loading" style="display: none;">
                        <div class="quiz-spinner"></div>
                        <p>The spirits are preparing your trial...</p>
                    </div>
                    <div id="quiz-content"></div>
                </div>
            </section>
        </main>

        <!-- Controls -->
        <footer>
            <button id="hunch-btn" class="secondary-btn">Give me a Hunch</button>
            <button id="quiz-btn" class="secondary-btn quiz-btn">Take the Quiz</button>
        </footer>
    </div>
    <script src="src/js/main.js" type="module"></script>
</body>
</html>
